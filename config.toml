parallel-jobs = 4
logging-to-file = true        # enables logging of every patch process to a seperate file
enable-magisk-update = true   # set this to false if you do not want to receive updates for the module in magisk app

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations
# extended
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"

rv-brand = "ReVanced Extended"
[YouTube]
build-mode = "module"
excluded-patches = "'Custom branding icon Revancify blue' 'Custom branding icon Revancify red' 'Custom branding icon MMT' 'Custom branding YouTube name' 'Enable debug logging'"
included-patches = "'MaterialYou'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
module-prop-name = "ytrv-magisk"

[YouTube-Revancify-Red]
build-mode = "module"
excluded-patches = "'Custom branding icon Revancify blue' 'Custom branding icon MMT' 'Custom branding YouTube name' 'Enable debug logging'"
included-patches = "'Custom branding icon Revancify red' 'MaterialYou'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
module-prop-name = "ytrv-magisk"

[YouTube-Revancify-Blue]
build-mode = "module"
excluded-patches = "'Custom branding icon Revancify red' 'Custom branding icon MMT' 'Custom branding YouTube name' 'Enable debug logging'"
included-patches = "'Custom branding icon Revancify blue' 'MaterialYou'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
module-prop-name = "ytrv-magisk"

[YouTube-MMT]
build-mode = "module"
excluded-patches = "'Custom branding icon Revancify blue' 'Custom branding icon Revancify red' 'Custom branding YouTube name' 'Enable debug logging'"
included-patches = "'Custom branding icon MMT' 'MaterialYou'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube/"
module-prop-name = "ytrv-magisk"


[YTMusic]
build-mode = "module"
app-name = "Music"
excluded-patches = "'Custom branding icon MMT' 'Custom branding icon Revancify blue' 'Custom branding icon Revancify red' 'Custom branding Music name' 'Enable compact dialog' 'Enable debug logging'"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music/"
module-prop-name = "ytmusicrvx-magisk"
apkmirror-arch = "arm64-v8a"
